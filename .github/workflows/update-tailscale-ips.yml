name: Update Tailscale DERP IPs

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  update-ips:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and parse DERP map
        run: |
          set -euo pipefail

          curl -sf https://controlplane.tailscale.com/derpmap/default -o derpmap.json

          # Clean old generated files so removed regions don't linger
          rm -f tailscale.*.txt

          python3 <<'PYEOF'
          import json
          import re

          def slugify(name):
              """Convert region name to lowercase slug: 'São Paulo' -> 'sao-paulo'"""
              import unicodedata
              name = unicodedata.normalize("NFKD", name)
              name = name.encode("ascii", "ignore").decode("ascii")
              name = re.sub(r"[^a-zA-Z0-9]+", "-", name).strip("-").lower()
              return name

          with open("derpmap.json") as f:
              data = json.load(f)

          all_ipv4 = []
          all_ipv6 = []
          regions = {}

          for region_id, region in sorted(data["Regions"].items(), key=lambda x: int(x[0])):
              rid = int(region_id)
              code = region.get("RegionCode", "")
              name = region.get("RegionName", "")
              regions[rid] = {"code": code, "name": name, "ipv4": [], "ipv6": []}

              for node in region.get("Nodes", []):
                  ipv4 = node.get("IPv4", "")
                  ipv6 = node.get("IPv6", "")
                  if ipv4:
                      all_ipv4.append(ipv4)
                      regions[rid]["ipv4"].append(ipv4)
                  if ipv6:
                      all_ipv6.append(ipv6)
                      regions[rid]["ipv6"].append(ipv6)

          # --- All IPs (IPv4 + IPv6) ---
          all_ips = sorted(all_ipv4) + sorted(all_ipv6)
          with open("tailscale.all.txt", "w") as f:
              f.write("\n".join(all_ips) + "\n")

          # --- All IPv4 ---
          with open("tailscale.all-ipv4.txt", "w") as f:
              f.write("\n".join(sorted(all_ipv4)) + "\n")

          # --- All IPv6 ---
          with open("tailscale.all-ipv6.txt", "w") as f:
              f.write("\n".join(sorted(all_ipv6)) + "\n")

          # --- Per-region files (by ID and by name) ---
          for rid in sorted(regions.keys()):
              r = regions[rid]
              ips = sorted(r["ipv4"]) + sorted(r["ipv6"])
              header = f"# Region {rid}: {r['name']} ({r['code']})\n"

              # By region ID: tailscale.region.13.txt
              with open(f"tailscale.region.{rid}.txt", "w") as f:
                  f.write(header)
                  f.write("\n".join(ips) + "\n")

              # By region name: tailscale.region.denver.txt
              slug = slugify(r["name"])
              with open(f"tailscale.region.{slug}.txt", "w") as f:
                  f.write(header)
                  f.write("\n".join(ips) + "\n")

          PYEOF

          rm -f derpmap.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "Tailscale IPs as of ${DATE}"
            git push
          fi
